name: Pipeline — path-based PR labels

on:
  workflow_call:
    inputs:
      runner:
        description: >
          JSON array of GitHub Actions runner labels. Defaults to GitHub-hosted
          (ubuntu-latest). Override with a self-hosted label array, e.g.
          '["self-hosted","retainer"]', to use a runner pool.
        type: string
        required: false
        default: '["ubuntu-latest"]'
      labeler-config:
        type: string
        required: false
        default: .github/labeler.yml

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ${{ fromJSON(inputs.runner) }}
    steps:
      - name: Apply labels from labeler config
        uses: actions/labeler@v5
        with:
          configuration-path: ${{ inputs.labeler-config }}
          sync-labels: false
