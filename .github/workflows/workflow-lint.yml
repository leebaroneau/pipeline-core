name: Pipeline — workflow-lint

on:
  workflow_call:
    inputs:
      runner:
        description: >
          JSON array of GitHub Actions runner labels. Defaults to the retainer's
          self-hosted pool. Override with '["ubuntu-latest"]' to force GitHub-hosted.
        type: string
        required: false
        default: '["self-hosted", "retainer"]'
      config-path:
        type: string
        required: false
        default: .github/pipeline-config.yml

permissions:
  contents: read
  pull-requests: write

jobs:
  workflow-lint:
    runs-on: ${{ fromJSON(inputs.runner) }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v5

      - name: Checkout pipeline-core
        uses: actions/checkout@v5
        with:
          repository: leebaroneau/pipeline-core
          ref: v1
          path: .pipeline-core

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install pipeline deps
        working-directory: .pipeline-core
        run: npm ci

      - name: Run workflow-lint
        id: lint
        env:
          CONFIG_PATH: ${{ inputs.config-path }}
        run: |
          set +e
          OUTPUT=$(node .pipeline-core/scripts/lint-workflows.mjs 2>&1)
          STATUS=$?
          {
            echo "lint_output<<EOF"
            echo "$OUTPUT"
            echo "EOF"
            echo "lint_status=$STATUS"
          } >> "$GITHUB_OUTPUT"
          exit 0

      - name: Post sticky comment (failure)
        if: steps.lint.outputs.lint_status != '0'
        uses: actions/github-script@v8
        with:
          script: |
            const { postOrUpdateSticky } = await import(`${process.env.GITHUB_WORKSPACE}/.pipeline-core/scripts/lib/sticky-comment.mjs`);
            await postOrUpdateSticky({
              github,
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              marker: "<!-- pipeline:workflow-lint -->",
              body: process.env.LINT_OUTPUT,
            });
        env:
          LINT_OUTPUT: ${{ steps.lint.outputs.lint_output }}

      - name: Remove sticky comment (success)
        if: steps.lint.outputs.lint_status == '0'
        uses: actions/github-script@v8
        with:
          script: |
            const { deleteSticky } = await import(`${process.env.GITHUB_WORKSPACE}/.pipeline-core/scripts/lib/sticky-comment.mjs`);
            await deleteSticky({
              github,
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              marker: "<!-- pipeline:workflow-lint -->",
            });

      - name: Fail the job if lint failed
        if: steps.lint.outputs.lint_status != '0'
        run: exit 1
