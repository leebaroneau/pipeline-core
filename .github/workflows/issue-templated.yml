name: Pipeline — auto-close non-template issues

on:
  workflow_call:
    inputs:
      runner:
        description: >
          JSON array of GitHub Actions runner labels. Defaults to the retainer's
          self-hosted pool. Override with '["ubuntu-latest"]' to force GitHub-hosted.
        type: string
        required: false
        default: '["self-hosted", "retainer"]'
      config-path:
        type: string
        required: false
        default: .github/pipeline-config.yml

permissions:
  issues: write

jobs:
  check-template:
    runs-on: ${{ fromJSON(inputs.runner) }}
    if: ${{ !contains(github.event.issue.user.type, 'Bot') }}
    steps:
      - name: Close if missing one of the known template signatures
        uses: actions/github-script@v8
        env:
          CONFIG_PATH: ${{ inputs.config-path }}
        with:
          script: |
            const body = context.payload.issue.body || '';
            const title = context.payload.issue.title || '';

            const KNOWN_PREFIXES = ['[Improvement]:', '[Bug]:', '[Spike]:', '[Experiment]:', 'Task:'];
            const titleHasPrefix = KNOWN_PREFIXES.some(p => title.startsWith(p));

            const KNOWN_HEADERS = ['### Hypothesis', '### Expected Behavior', '### Question', '### Success Metric', '### Out of Scope'];
            const bodyHasHeader = KNOWN_HEADERS.some(h => body.includes(h));

            if (titleHasPrefix || bodyHasHeader) {
              return;
            }

            const issue_number = context.payload.issue.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: [
                "This issue does not appear to use one of the four templates (Improvement / Bug / Spike / Experiment).",
                "",
                "Auto-closing. Please reopen with a template via the [issue templates](../issues/new/choose).",
              ].join('\n'),
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              state: 'closed',
              state_reason: 'not_planned',
            });
