name: Pipeline — branch-name check

on:
  workflow_call:
    inputs:
      config-path:
        type: string
        required: false
        default: .github/pipeline-config.yml

permissions:
  contents: read
  statuses: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v5

      - name: Checkout pipeline-core
        uses: actions/checkout@v5
        with:
          repository: leebaroneau/pipeline-core
          ref: v1
          path: .pipeline-core

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pipeline deps
        working-directory: .pipeline-core
        run: npm ci

      - name: Evaluate + post status check
        uses: actions/github-script@v7
        env:
          NODE_PATH: ${{ github.workspace }}/.pipeline-core/node_modules
          CONFIG_PATH: ${{ inputs.config-path }}
        with:
          script: |
            const { checkBranchName } = await import(`${process.env.GITHUB_WORKSPACE}/.pipeline-core/scripts/check-branch-name.mjs`);
            const { postOrUpdateSticky, deleteSticky } = await import(`${process.env.GITHUB_WORKSPACE}/.pipeline-core/scripts/lib/sticky-comment.mjs`);

            const branchName = context.payload.pull_request.head.ref;
            const result = checkBranchName(branchName);
            const sha = context.payload.pull_request.head.sha;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;
            const MARKER = "<!-- pipeline:branch-name-failure -->";

            await github.rest.repos.createCommitStatus({
              owner, repo, sha,
              state: result.ok ? "success" : "failure",
              context: "pipeline/branch-name",
              description: result.ok ? "Branch name matches pattern" : "Branch name does not match pattern",
            });

            if (result.ok) {
              await deleteSticky({ github, owner, repo, issue_number, marker: MARKER });
            } else {
              await postOrUpdateSticky({
                github, owner, repo, issue_number, marker: MARKER,
                body: `❌ **Branch-name check failed**\n\n${result.reasons[0]}\n\nRename your branch and force-push:\n\`\`\`\ngit branch -m <new-name>\ngit push origin :${branchName} HEAD\n\`\`\``,
              });
            }
