name: Pipeline — doctor

# Reusable install-doctor workflow. Runs the same non-mutating checks as
# `make pipeline-doctor` (config validation, artifact drift, caller upstream
# pin, optional branch protection) and emits structured outputs the fleet
# orchestrator in `leebaroneau/pipeline-fleet` consumes.
#
# Inputs:
#   config-path            (default `.github/pipeline-config.yml`)
#   branch                 (default `main`; target for branch-protection check)
#   required-check         (default `pipeline/merge-gate`)
#   post-sticky            ("true"/"false", default "false") — post the
#                           doctor report as a sticky issue comment when a
#                           tracking issue exists with the marker
#                           `<!-- pipeline:doctor-tracker -->`
#
# Outputs:
#   ok          "true" if no failures (warnings are non-fatal)
#   report      human-readable report text
#   result      full JSON result for downstream tooling (e.g. fleet dashboards)
#
# Permissions are scoped to the minimum each step needs.

on:
  workflow_call:
    inputs:
      config-path:
        type: string
        required: false
        default: .github/pipeline-config.yml
      branch:
        type: string
        required: false
        default: main
      required-check:
        type: string
        required: false
        default: pipeline/merge-gate
      post-sticky:
        type: string
        required: false
        default: "false"
    outputs:
      ok:
        description: "true if all checks passed (warnings non-fatal)"
        value: ${{ jobs.doctor.outputs.ok }}
      report:
        description: Human-readable doctor report
        value: ${{ jobs.doctor.outputs.report }}
      result:
        description: Full doctor result as JSON
        value: ${{ jobs.doctor.outputs.result }}

# Reusable workflows inherit the caller's permissions. We declare the minimum
# set we actually consume:
#   - contents: read         — checkout the caller repo + pipeline-core
#   - issues: write          — only when post-sticky=true; granted at workflow
#                              level so the conditional sticky-tracker step
#                              works. Callers that never set post-sticky=true
#                              can drop `issues: write` from their caller.
# We do NOT request pull-requests:write — the doctor never writes to PRs.
permissions:
  contents: read
  issues: write

jobs:
  doctor:
    runs-on: ubuntu-latest
    outputs:
      ok: ${{ steps.run.outputs.ok }}
      report: ${{ steps.run.outputs.report }}
      result: ${{ steps.run.outputs.result }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v5

      - name: Checkout pipeline-core
        uses: actions/checkout@v5
        with:
          repository: leebaroneau/pipeline-core
          ref: v1
          path: .pipeline-core

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install pipeline-core deps
        working-directory: .pipeline-core
        run: npm ci

      - name: Run doctor
        id: run
        uses: actions/github-script@v8
        env:
          CONFIG_PATH: ${{ inputs.config-path }}
          BRANCH: ${{ inputs.branch }}
          REQUIRED_CHECK: ${{ inputs.required-check }}
        with:
          # In-process octokit shim around the GITHUB_TOKEN-scoped client that
          # `github-script` already gives us — same shape the doctor expects.
          script: |
            const { runDoctor, discoverKnownWorkflows, formatReport } = await import(
              `${process.env.GITHUB_WORKSPACE}/.pipeline-core/scripts/doctor.mjs`
            );
            const path = require("node:path");
            const known = discoverKnownWorkflows(
              path.join(process.env.GITHUB_WORKSPACE, ".pipeline-core/templates/caller-workflows"),
            );
            const skeletonsDir = path.join(
              process.env.GITHUB_WORKSPACE,
              ".pipeline-core/scripts/templates",
            );
            const octokit = {
              rest: {
                repos: {
                  getBranchProtection: async (args) => github.rest.repos.getBranchProtection(args),
                },
              },
            };
            const result = await runDoctor({
              repoDir: process.env.GITHUB_WORKSPACE,
              configPath: process.env.CONFIG_PATH,
              templateSkeletonsDir: skeletonsDir,
              knownWorkflows: known,
              octokit,
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: process.env.BRANCH,
              requiredCheck: process.env.REQUIRED_CHECK,
            });
            const report = formatReport(result);
            core.summary
              .addRaw("```\n" + report + "\n```")
              .write();
            core.setOutput("ok", result.ok ? "true" : "false");
            core.setOutput("report", report);
            core.setOutput("result", JSON.stringify(result));

      - name: Post or update sticky tracker (when post-sticky=true)
        if: inputs.post-sticky == 'true'
        uses: actions/github-script@v8
        env:
          REPORT: ${{ steps.run.outputs.report }}
          OK: ${{ steps.run.outputs.ok }}
        with:
          script: |
            const TRACKER_MARKER = "<!-- pipeline:doctor-tracker -->";
            const { data: issues } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:body "${TRACKER_MARKER}"`,
              sort: "created",
              order: "asc",
            });
            const now = new Date().toISOString();
            const body = `### Doctor scan ${now}\n\n\`\`\`\n${process.env.REPORT}\n\`\`\``;
            if (issues.items.length > 0) {
              // Always append to the OLDEST tracker. If concurrent runs raced and
              // each created a tracker, the second one will see the first's issue
              // here and consolidate to it. We also auto-close any extra trackers
              // that snuck in past the first.
              const [primary, ...extras] = issues.items;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: primary.number,
                body,
              });
              for (const extra of extras) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: extra.number,
                  state: "closed",
                  state_reason: "not_planned",
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: extra.number,
                  body: `Closed as duplicate of #${primary.number} (auto-deduped by pipeline-core doctor).`,
                });
              }
            } else if (process.env.OK !== 'true') {
              // Only open a tracker if we have something to report.
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Pipeline Core install health: needs attention (${now.slice(0, 10)})`,
                body: `${TRACKER_MARKER}\n\nScheduled doctor run found install drift or branch-protection gaps.\n\n${body}`,
                labels: ["type:task", "priority:p3", "status:backlog"],
              });
            }

      - name: Fail the job on doctor failure
        if: steps.run.outputs.ok != 'true'
        run: |
          echo "::error::Pipeline Core install doctor reported failures. See the job summary above for details."
          exit 1
