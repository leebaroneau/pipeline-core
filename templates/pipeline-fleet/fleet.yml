# .github/workflows/fleet.yml  (in an org's `.github` repo)
#
# Caller for pipeline-core's reusable fleet workflow. Each org has its own copy
# with its own `owner:` value pointing at itself. The reusable workflow handles
# the actual audit + discovery + tracker update.

name: Fleet — doctor + discover

on:
  workflow_dispatch:
    inputs:
      mode:
        type: choice
        options: [doctor, discover, both, refresh]
        default: doctor
        description: doctor=audit · discover=find new · both · refresh=distribute missing caller shims

jobs:
  fleet:
    uses: leebaroneau/pipeline-core/.github/workflows/fleet.yml@v1
    permissions:
      contents: write
    with:
      owner: {{OWNER}}              # The installer replaces this with the org name (e.g. Haverford-Brands)
      mode: ${{ inputs.mode || 'both' }}
      # Org-owned GitHub App (preferred over FLEET_PAT). Set the PIPELINE_BOT_APP_ID org
      # variable + PIPELINE_BOT_PRIVATE_KEY org secret once per org → fleet git/API ops
      # run on a short-lived App token instead of a personal PAT.
      app-id: ${{ vars.PIPELINE_BOT_APP_ID }}
    secrets:
      # Fallback while the App is being rolled out. Retire FLEET_PAT once the App is
      # confirmed working for the org's daily sweep.
      FLEET_PAT: ${{ secrets.FLEET_PAT }}
      PIPELINE_BOT_PRIVATE_KEY: ${{ secrets.PIPELINE_BOT_PRIVATE_KEY }}
