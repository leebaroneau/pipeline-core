name: Pipeline — close-button revert

on:
  workflow_call:
    inputs:
      runner:
        description: >
          JSON array of GitHub Actions runner labels. Defaults to GitHub-hosted
          (ubuntu-latest). Override with a self-hosted label array, e.g.
          '["self-hosted","retainer"]', to use a runner pool.
        type: string
        required: false
        default: '["ubuntu-latest"]'
      config-path:
        type: string
        required: false
        default: .github/pipeline-config.yml

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  check:
    runs-on: ${{ fromJSON(inputs.runner) }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v5

      - name: Checkout pipeline-core
        uses: actions/checkout@v5
        with:
          repository: leebaroneau/pipeline-core
          ref: v1
          path: .pipeline-core

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install pipeline deps
        working-directory: .pipeline-core
        run: npm ci

      - name: Evaluate and revert if needed
        uses: actions/github-script@v8
        env:
          NODE_PATH: ${{ github.workspace }}/.pipeline-core/node_modules
          CONFIG_PATH: ${{ inputs.config-path }}
        with:
          script: |
            const { shouldRevertClose } = await import(`${process.env.GITHUB_WORKSPACE}/.pipeline-core/scripts/close-button-revert.mjs`);

            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;

            const labels = (issue.labels || []).map(l => l.name);

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number,
              per_page: 20,
              sort: 'created',
              direction: 'desc',
            });
            const recentComments = comments.map(c => ({ body: c.body, createdAt: c.created_at }));

            const { data: events } = await github.rest.issues.listEventsForTimeline({
              owner, repo, issue_number,
              per_page: 50,
            });
            const timelineEvents = events.map(e => ({
              event: e.event,
              commit_id: e.commit_id,
              created_at: e.created_at,
            }));

            // A close caused by a merged PR (Fixes/Closes #N) or a commit is the
            // sanctioned path. GitHub's REST timeline does not reliably mark a
            // squash-merge PR-body close (the closed event has commit_id:null and the
            // PR link is a cross-reference, not a referenced commit), so resolve it
            // directly via the latest ClosedEvent's closer.
            let mergedPrLinked = false;
            try {
              const gql = await github.graphql(
                `query($owner:String!,$repo:String!,$number:Int!){
                   repository(owner:$owner,name:$repo){
                     issue(number:$number){
                       timelineItems(last:10, itemTypes:[CLOSED_EVENT]){
                         nodes{ ... on ClosedEvent {
                           closer { __typename ... on PullRequest { merged } ... on Commit { oid } }
                         } }
                       }
                     }
                   }
                 }`,
                { owner, repo, number: issue_number }
              );
              const nodes = gql?.repository?.issue?.timelineItems?.nodes || [];
              const closer = nodes.length ? nodes[nodes.length - 1].closer : null;
              mergedPrLinked =
                closer?.__typename === 'Commit' ||
                (closer?.__typename === 'PullRequest' && closer.merged === true);
            } catch (e) {
              console.log(`mergedPrLinked lookup failed (non-fatal): ${e.message}`);
            }

            const decision = shouldRevertClose({ labels, recentComments, mergedPrLinked, timelineEvents });

            if (!decision.revert) {
              console.log('Closure stands.');
              return;
            }

            await github.rest.issues.update({
              owner, repo, issue_number,
              state: 'open',
            });

            await github.rest.issues.createComment({
              owner, repo, issue_number,
              body: `🔄 Reopened automatically. ${decision.message}`,
            });
