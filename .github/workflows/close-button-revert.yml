name: Pipeline — close-button revert

on:
  workflow_call:
    inputs:
      config-path:
        type: string
        required: false
        default: .github/pipeline-config.yml

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v5

      - name: Checkout pipeline-core
        uses: actions/checkout@v5
        with:
          repository: leebaroneau/pipeline-core
          ref: v1
          path: .pipeline-core

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pipeline deps
        working-directory: .pipeline-core
        run: npm ci

      - name: Evaluate and revert if needed
        uses: actions/github-script@v7
        env:
          NODE_PATH: ${{ github.workspace }}/.pipeline-core/node_modules
          CONFIG_PATH: ${{ inputs.config-path }}
        with:
          script: |
            const { shouldRevertClose } = await import(`${process.env.GITHUB_WORKSPACE}/.pipeline-core/scripts/close-button-revert.mjs`);

            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;

            const labels = (issue.labels || []).map(l => l.name);

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number,
              per_page: 20,
              sort: 'created',
              direction: 'desc',
            });
            const recentComments = comments.map(c => ({ body: c.body, createdAt: c.created_at }));

            const { data: events } = await github.rest.issues.listEventsForTimeline({
              owner, repo, issue_number,
              per_page: 50,
            });
            const mergedPrLinked = events.some(e =>
              e.event === 'closed' &&
              e.commit_id !== null &&
              e.commit_id !== undefined
            );

            const decision = shouldRevertClose({ labels, recentComments, mergedPrLinked });

            if (!decision.revert) {
              console.log('Closure stands.');
              return;
            }

            await github.rest.issues.update({
              owner, repo, issue_number,
              state: 'open',
            });

            await github.rest.issues.createComment({
              owner, repo, issue_number,
              body: `🔄 Reopened automatically. ${decision.message}`,
            });
