name: Pipeline — reject unknown labels

on:
  workflow_call:
    inputs:
      config-path:
        type: string
        required: false
        default: .github/pipeline-config.yml

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Checkout pipeline-core
        uses: actions/checkout@v5
        with:
          repository: <org>/pipeline-core
          ref: v1
          path: .pipeline-core

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pipeline deps
        working-directory: .pipeline-core
        run: npm ci

      - name: Reject if label not in .github/labels.yml
        uses: actions/github-script@v7
        env:
          NODE_PATH: ${{ github.workspace }}/.pipeline-core/node_modules
          CONFIG_PATH: ${{ inputs.config-path }}
        with:
          script: |
            const fs = require('fs');
            const yaml = require('js-yaml');
            const labelsFile = fs.readFileSync('.github/labels.yml', 'utf8');
            const validLabels = new Set(yaml.load(labelsFile).map(l => l.name));

            const label = context.payload.label?.name;
            if (!label) return;

            if (!validLabels.has(label)) {
              const isIssue = context.eventName === 'issues';
              const issue_number = isIssue ? context.payload.issue.number : context.payload.pull_request.number;

              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                name: label,
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body: `Removed label \`${label}\` — it is not declared in [\`.github/labels.yml\`](../blob/main/.github/labels.yml). To add a new label, edit \`.github/pipeline-config.yml\` (for domain/component labels) or pipeline-core's universal-labels list.`,
              });

              core.setFailed(`Rejected unknown label: ${label}`);
            }
