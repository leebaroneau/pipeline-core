name: Pipeline — Triage gate

on:
  workflow_call:
    inputs:
      config-path:
        type: string
        required: false
        default: .github/pipeline-config.yml

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    if: ${{ github.event.issue.state == 'open' }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v5

      - name: Checkout pipeline-core
        uses: actions/checkout@v5
        with:
          repository: leebaroneau/pipeline-core
          ref: v1
          path: .pipeline-core

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pipeline deps
        working-directory: .pipeline-core
        run: npm ci

      - name: Evaluate triage gate
        id: gate
        uses: actions/github-script@v7
        env:
          NODE_PATH: ${{ github.workspace }}/.pipeline-core/node_modules
          CONFIG_PATH: ${{ inputs.config-path }}
        with:
          script: |
            const { checkTriageGate } = await import(`${process.env.GITHUB_WORKSPACE}/.pipeline-core/scripts/check-triage-gate.mjs`);
            const labels = (context.payload.issue.labels || []).map(l => l.name);
            const result = checkTriageGate({ labels });
            core.setOutput('ok', String(result.ok));
            core.setOutput('reasons', result.reasons.join('\n'));
            return result;

      - name: Apply status:triage label if gate passes
        if: steps.gate.outputs.ok == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Skip if the issue is already past Triage (avoid clobbering in-flight state)
            const labels = (context.payload.issue.labels || []).map(l => l.name);
            const currentStatus = labels.find(l => l.startsWith('status:'));
            if (currentStatus && currentStatus !== 'status:backlog' && currentStatus !== 'status:triage') {
              console.log(`Issue already in ${currentStatus}; skipping status:triage application.`);
              return;
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['status:triage'],
            }).catch((e) => {
              core.warning(`Could not apply status:triage label: ${e.message}`);
            });
