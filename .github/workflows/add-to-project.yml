name: Pipeline — add issue to org project

on:
  workflow_call:
    inputs:
      runner:
        description: >
          JSON array of GitHub Actions runner labels. Defaults to the retainer's
          self-hosted pool. Override with '["ubuntu-latest"]' to force GitHub-hosted.
        type: string
        required: false
        default: '["self-hosted", "retainer"]'
      config-path:
        type: string
        required: false
        default: .github/pipeline-config.yml
      project-url-default:
        description: >
          Org project URL to use when the repo's pipeline-config.yml does not set
          org_project.url. Wire this to the org variable ADD_TO_PROJECT_URL in the
          caller shim so each org targets its own roadmap with no per-repo config.
        type: string
        required: false
        default: ""
      app-id:
        description: >
          GitHub App ID for the org-owned pipeline-bot. Wire to vars.PIPELINE_BOT_APP_ID
          in the caller shim. When set (and PIPELINE_BOT_PRIVATE_KEY is present) the job
          mints a short-lived App installation token and uses it instead of the PAT.
          Leave empty to keep using ADD_TO_PROJECT_PAT.
        type: string
        required: false
        default: ""
    secrets:
      ADD_TO_PROJECT_PAT:
        description: >
          PAT with project + repo read/write scopes. Fallback when the App is not yet
          configured. GITHUB_TOKEN cannot modify org projects. If neither App nor PAT
          is set, the add-to-project step is skipped.
        required: false
      PIPELINE_BOT_PRIVATE_KEY:
        description: >
          Private key (.pem contents) for the pipeline-bot GitHub App. Paired with
          app-id. When present, a 1-hour installation token is minted at runtime and
          preferred over ADD_TO_PROJECT_PAT.
        required: false

permissions:
  contents: read

jobs:
  add-to-project:
    runs-on: ${{ fromJSON(inputs.runner) }}
    if: ${{ github.event.issue != null }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v5

      - name: Checkout pipeline-core
        uses: actions/checkout@v5
        with:
          repository: leebaroneau/pipeline-core
          ref: v1
          path: .pipeline-core

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install pipeline deps
        working-directory: .pipeline-core
        run: npm ci

      - name: Resolve project URL (repo config overrides org default)
        id: project
        uses: actions/github-script@v8
        env:
          NODE_PATH: ${{ github.workspace }}/.pipeline-core/node_modules
          CONFIG_PATH: ${{ inputs.config-path }}
          PROJECT_URL_DEFAULT: ${{ inputs.project-url-default }}
        with:
          script: |
            const { loadConfig } = await import(`${process.env.GITHUB_WORKSPACE}/.pipeline-core/scripts/lib/config.mjs`);
            let configUrl = '';
            try {
              const config = loadConfig(process.env.CONFIG_PATH);
              configUrl = config?.org_project?.url ?? '';
            } catch {
              // Config missing or unreadable — fall through to the org default
            }
            // Per-repo config wins; otherwise use the org-wide default (org variable).
            const url = configUrl || (process.env.PROJECT_URL_DEFAULT ?? '');
            core.setOutput('url', url);
            if (!url) {
              core.info('No project URL: org variable ADD_TO_PROJECT_URL unset and no org_project.url in config — skipping.');
            } else {
              core.info(`Adding issue to project: ${url} (source: ${configUrl ? 'repo config' : 'org variable'})`);
            }

      # Mint a short-lived (1h) org-owned App token when the App is configured.
      # continue-on-error is REQUIRED: a failed mint (App not installed yet, missing
      # permission, key/ID mismatch, propagation lag) otherwise aborts the job and the
      # `|| secrets.ADD_TO_PROJECT_PAT` fallback below never evaluates (|| only falls
      # back on an empty string, not a failed step).
      - name: Mint App token
        id: app-token
        if: ${{ steps.project.outputs.url != '' && inputs.app-id != '' }}
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ inputs.app-id }}
          private-key: ${{ secrets.PIPELINE_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Add issue to org project
        if: steps.project.outputs.url != ''
        uses: actions/add-to-project@v1.3.0
        with:
          project-url: ${{ steps.project.outputs.url }}
          # App token when minted; PAT otherwise. App token is empty (not error) when
          # app-id is unset or the mint step failed under continue-on-error.
          github-token: ${{ steps.app-token.outputs.token || secrets.ADD_TO_PROJECT_PAT }}
