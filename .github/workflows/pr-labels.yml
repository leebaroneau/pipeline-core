name: Pipeline — path-based PR labels

on:
  workflow_call:
    inputs:
      runner:
        description: >
          JSON array of GitHub Actions runner labels. Defaults to the retainer's
          self-hosted pool. Override with '["ubuntu-latest"]' to force GitHub-hosted.
        type: string
        required: false
        default: '["self-hosted", "retainer"]'
      labeler-config:
        type: string
        required: false
        default: .github/labeler.yml

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ${{ fromJSON(inputs.runner) }}
    steps:
      - name: Apply labels from labeler config
        uses: actions/labeler@v5
        with:
          configuration-path: ${{ inputs.labeler-config }}
          sync-labels: false
