name: Pipeline — issue-template compatibility

on:
  workflow_call:
    inputs:
      runner:
        description: >
          JSON array of GitHub Actions runner labels. Defaults to GitHub-hosted
          (ubuntu-latest). Override with a self-hosted label array, e.g.
          '["self-hosted","retainer"]', to use a runner pool.
        type: string
        required: false
        default: '["ubuntu-latest"]'
      config-path:
        type: string
        required: false
        default: .github/pipeline-config.yml

permissions:
  issues: read

jobs:
  issue-template-compatibility:
    runs-on: ${{ fromJSON(inputs.runner) }}
    if: ${{ !contains(github.event.issue.user.type, 'Bot') }}
    steps:
      - name: Leave issue open
        env:
          CONFIG_PATH: ${{ inputs.config-path }}
        run: |
          echo "Issue template auto-close is retired; leaving issue open."
          echo "Config path: ${CONFIG_PATH}"
