# .github/workflows/pipeline-drift-scan.yml
name: Pipeline — drift-scan

on:
  pull_request:
    paths:
      - '.github/pipeline-config.yml'
      - 'scripts/pipeline/lib/universal-labels.mjs'
      - 'scripts/pipeline/generate-*.mjs'
      - '.github/labels.yml'
      - '.github/labeler.yml'
      - '.github/ISSUE_TEMPLATE/**'
      - 'scripts/pipeline/lib/slash-commands.mjs'
      - 'README.md'
      - '00_resources/pipeline-core/README.md'
    types: [opened, synchronize]
  schedule:
    - cron: '0 8 * * 1'    # Monday 08:00 UTC
  workflow_dispatch:

jobs:
  drift-scan:
    uses: <org>/pipeline-core/.github/workflows/drift-scan.yml@v1
    permissions:
      contents: read
      issues: write
      pull-requests: write
    with:
      config-path: .github/pipeline-config.yml
