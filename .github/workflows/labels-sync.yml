name: Pipeline — sync labels from labels.yml

on:
  workflow_call:
    inputs:
      runner:
        description: >
          JSON array of GitHub Actions runner labels. Defaults to the retainer's
          self-hosted pool. Override with '["ubuntu-latest"]' to force GitHub-hosted.
        type: string
        required: false
        default: '["self-hosted", "retainer"]'
      config-path:
        type: string
        required: false
        default: .github/pipeline-config.yml

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  sync:
    runs-on: ${{ fromJSON(inputs.runner) }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v5

      - name: Sync labels (create / update / delete)
        uses: EndBug/label-sync@v2
        with:
          config-file: .github/labels.yml
          delete-other-labels: true
